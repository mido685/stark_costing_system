name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run basic check
        run: |
          python -m compileall .

  cd:
    name: Release (only on tags)
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show version
        run: echo "VERSION = $GITHUB_REF_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2